<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seating admin</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <header class="topbar"><h1>Seating admin</h1></header>
  <main class="hostwrap">
    <div id="app">
      <div id="map" class="map tall"></div>
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="title-row">
            <h2>Unseated <span id="unseated-count" class="count"></span></h2>
            <button id="unseat-all" class="link-btn">Unseat all</button>
          </div>
          <div id="sidebar-stats" class="sidebar-stats"></div>
          <input id="roster-filter" class="roster-filter" type="search" placeholder="Filter guests…" autocomplete="off" />
        </div>
        <div id="unseated" class="roster"></div>
        <div class="sidebar-foot">
          <details id="import-box"><summary>Import from sheet (CSV)</summary><div id="import"></div></details>
        </div>
      </aside>
      <div id="panel" class="panel" hidden></div>
    </div>
  </main>
  <script type="module" src="/src/host/main.ts"></script>
</body>
</html>
